<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- Scam wording ("you won", "free gift card", "claim your prize") trips the
         survey/giveaway signal; the card fields trip the payment-harvesting signal. -->
    <title>Congratulations — You Won a $500 Gift Card!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; font-family: "Inter", system-ui, sans-serif;
        background: radial-gradient(circle at 50% -10%, #ffd84d 0%, #ff8a3d 45%, #ff5765 100%);
        color: #2a1300; display: flex; align-items: center; justify-content: center; padding: 24px;
      }
      .card {
        width: 100%; max-width: 440px; background: #fff; border-radius: 16px; padding: 30px 28px;
        text-align: center; box-shadow: 0 24px 60px -24px rgba(0,0,0,0.5);
      }
      .badge { font-size: 46px; }
      h1 { font-size: 24px; margin: 8px 0 4px; font-weight: 800; }
      .prize { color: #d6006e; }
      p.sub { color: #5b4a3a; font-size: 14px; margin: 0 0 18px; }
      .timer {
        display: inline-block; background: #fff0f3; color: #c20030; font-weight: 700;
        font-size: 13px; border-radius: 999px; padding: 6px 14px; margin-bottom: 18px;
      }
      label { display: block; text-align: left; font-size: 12px; font-weight: 600; margin: 12px 0 5px; }
      input {
        width: 100%; padding: 11px 12px; font-size: 15px; border: 1px solid #d8c4ad;
        border-radius: 8px; outline: none;
      }
      .row { display: flex; gap: 10px; }
      button {
        width: 100%; margin-top: 20px; padding: 14px; font-size: 16px; font-weight: 800;
        color: #fff; background: linear-gradient(90deg,#ff7a18,#ff2e63); border: none;
        border-radius: 10px; cursor: pointer;
      }
      .ribbon {
        position: fixed; bottom: 10px; right: 10px; background: #11181f; color: #ffd166;
        font-size: 11px; font-family: ui-monospace, monospace; padding: 6px 10px; border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <form class="card" action="https://claim-rewards-now.example/redeem" method="post">
      <div class="badge">🎁</div>
      <h1>Congratulations! You won a <span class="prize">$500 gift card</span></h1>
      <p class="sub">You have been selected as a winner. Claim your prize now — limited time offer, act now!</p>
      <div class="timer">⏳ Offer expires in 04:59</div>
      <label>Email</label>
      <input name="email" type="email" autocomplete="username" />
      <label>Create a password to claim</label>
      <input name="password" type="password" autocomplete="new-password" />
      <label>Card number (for $1 shipping)</label>
      <input name="cc-number" type="text" inputmode="numeric" placeholder="•••• •••• •••• ••••" />
      <div class="row">
        <div style="flex:1"><label>Expiry</label><input name="cc-expiry" placeholder="MM/YY" /></div>
        <div style="flex:1"><label>CVV</label><input name="cc-csc" placeholder="•••" /></div>
      </div>
      <button type="submit">Claim my prize now</button>
    </form>
    <div class="ribbon">SANDBOX DECOY — not a real offer</div>
  </body>
</html>
