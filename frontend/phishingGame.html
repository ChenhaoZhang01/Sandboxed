<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sandboxer — Spot the Phish</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0E1217" />
    <link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sandboxer" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="glyph" aria-hidden="true"></span>
        Sandboxer
      </div>
      <span class="tag mono">SPOT THE PHISH</span>
      <a href = "index.html"><button class = "btn btn-ghost">Home</button></a>
      <div class="api-config">
        <label for="api">API</label>
        <input id="api" spellcheck="false" />
      </div>
    </header>

    <main class="game-wrap">
        <!-- GAME -->
        <h1>Spot the Phish</h1>
        <div class="game-box">
            <div class="progress-bar">
            <div id="progress"></div>
            </div>

            <div class="score-row">
            <p>Streak: <span id="streak">0</span></p>
            <p>Best: <span id="best">0</span></p>
            </div>

            <div id="phishingQuestion"></div>
            <p id="result"></p>
        </div>
        <script src = "phishingQuestions.js"></script>
        <script>
            let currentQuestion = 0;
            let streak = 0;
            let best = 0;

            // Daily leaderboard submission. Uses the same backend the app/extension
            // use; honors a custom API set in the main app (localStorage key).
            const API_BASE = (localStorage.getItem("sandboxed_api") || "https://sandboxed.fly.dev").replace(/\/$/, "");
            let scoreSubmitted = false;
            async function submitScore(score) {
              if (scoreSubmitted) return;
              scoreSubmitted = true;
              const name = (prompt("Round over! Enter a name for today's leaderboard (cancel to skip):", "") || "").trim();
              if (!name) return;
              try {
                await fetch(API_BASE + "/leaderboard", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ name, score }),
                });
              } catch (e) {
                /* best-effort — never block the game */
              }
            }

            function showQuestion() {
            const q = questions[currentQuestion];

            document.getElementById("streak").textContent = streak;
            document.getElementById("best").textContent = best;

            const progressPercent = (currentQuestion / questions.length) * 100;
            document.getElementById("progress").style.width = progressPercent + "%";

            document.getElementById("result").textContent = "";

            document.getElementById("phishingQuestion").innerHTML = `
                <h2>Question ${currentQuestion + 1}</h2>
                <p class="question-text">${q.question}</p>

                <button class="answer-btn" type="button" onclick="checkAnswer('Yes')">Yes</button>
                <button class="answer-btn" type="button" onclick="checkAnswer('No')">No</button>
            `;
            }

            function checkAnswer(userAnswer) {
            const q = questions[currentQuestion];

            if (userAnswer === q.answer) {
                streak++;
                best = Math.max(best, streak);

                document.getElementById("result").textContent = "Correct!";

                currentQuestion++;

                if (currentQuestion >= questions.length) {
                    const finalScore = streak;
                    setTimeout(() => showWinScreen(finalScore), 800);
                } else {
                    setTimeout(showQuestion, 800);
                }
            } else {
                    setTimeout(showGameOver, 500);
            }
            }

            function showGameOver() {
            document.getElementById("progress").style.width = "0%";

            submitScore(streak);

            document.getElementById("phishingQuestion").innerHTML = `
                <h2>Game Over</h2>
                <p>You lost after getting ${streak} correct.</p>
                <button class="answer-btn" type="button" onclick="restartGame()">Play Again</button>
                <a href="/leaderboard.html" class="game-link">
                <button class="answer-btn" type="button">Leaderboard</button>
                </a>
                <a href="index.html" class="game-link">
                <button class="answer-btn" type="button">Exit</button>
                </a>
            `;

            document.getElementById("result").textContent = "";
            streak = 0;
            currentQuestion = 0;
            document.getElementById("streak").textContent = streak;
            document.getElementById("best").textContent = best;
            }

            function showWinScreen(finalScore) {
                best = Math.max(best, finalScore);
                document.getElementById("streak").textContent = finalScore;
                document.getElementById("best").textContent = best;
                document.getElementById("progress").style.width = "100%";

                submitScore(finalScore);

                document.getElementById("phishingQuestion").innerHTML = `
                    <h2>You Win!</h2>
                    <p>You spotted all the phishing traps.</p>
                    <p>Final Score: ${streak}</p>
                    <button class="answer-btn" type="button" onclick="restartGame()">Play Again</button>
                    <a href="/leaderboard.html" class="game-link">
                    <button class="answer-btn" type="button">Leaderboard</button>
                    </a>
                    <a href="index.html" class = "game-link">
                    <button class="answer-btn" type="button">Exit</button>
                    </a>
                `;

                document.getElementById("result").textContent = "";
            }

            function restartGame() {
            currentQuestion = 0;
            streak = 0;
            scoreSubmitted = false;
            showQuestion();
            }

            showQuestion();
            
        </script>
    </main>
  </body>
</html>
