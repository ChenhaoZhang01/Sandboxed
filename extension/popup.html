<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body class="popup">
    <div class="sbx-head">
      <span class="glyph" aria-hidden="true"></span>
      <span class="name">Sandboxed</span>
      <a href="#" id="opts" class="gear" title="Settings">⚙</a>
    </div>
    <div class="sbx-body">
      <input
        id="url"
        class="url-input"
        placeholder="paste a link to check…"
        spellcheck="false"
        autocomplete="off"
      />
      <div class="actions">
        <button id="go" class="btn btn-primary">Check</button>
        <button id="tab" class="btn btn-ghost" type="button">This tab</button>
      </div>
      <div id="result"></div>

      <div class="dropzone" id="fileDropzone" tabindex="0" role="button"
           aria-label="Drop a file here or click to browse">
        <p>Drop a file to scan, or <button type="button" id="fileBrowse" class="dropzone-browse">browse</button></p>
        <p class="dropzone-status mono" id="fileStatus">ClamAV download / file checker</p>
        <input type="file" id="fileInput" hidden />
      </div>
      <div class="scan-result" id="fileScan" hidden></div>

      <div class="mode-line" id="modeLine"></div>
    </div>
    <script src="core.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
