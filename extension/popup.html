<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body class="popup">
    <div class="sbx-head">
      <span class="glyph" aria-hidden="true"></span>
      <span class="name">Sandboxer</span>
      <a href="#" id="opts" class="gear" title="Settings">⚙</a>
    </div>
    <div class="sbx-body">
      <input
        id="url"
        class="url-input"
        placeholder="paste a link to detonate…"
        spellcheck="false"
        autocomplete="off"
      />
      <div class="actions">
        <button id="go" class="btn btn-primary">Detonate</button>
        <button id="tab" class="btn btn-ghost" type="button">This tab</button>
      </div>
      <div id="result"></div>
      <p class="hint">
        Right-click any link on a page → <b>Detonate link in Sandboxer</b> to check
        it without opening it.
      </p>
    </div>
    <script src="core.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
