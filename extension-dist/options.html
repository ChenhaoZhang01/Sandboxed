<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sandboxed — settings</title>
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body class="popup">
    <div class="sbx-head">
      <span class="glyph" aria-hidden="true"></span>
      <span class="name">Sandboxed Settings</span>
    </div>
    <div class="sbx-body">
      <label class="opt-field" for="api">Detonation engine URL</label>
      <input
        id="api"
        class="url-input"
        placeholder="https://sandboxed.fly.dev"
        spellcheck="false"
        autocomplete="off"
      />
      <p class="hint">
        Point this at your backend — the default hosted endpoint is
        <b>https://sandboxed.fly.dev</b>, or swap in your own local/dev URL if needed.
      </p>

      <label class="opt-field">When should links be checked?</label>
      <div class="modes">
        <label class="mode-opt">
          <input type="radio" name="mode" value="manual" />
          <span><b>Manually</b> — only when I right-click → “Check this link”</span>
        </label>
        <label class="mode-opt">
          <input type="radio" name="mode" value="click" />
          <span><b>On click</b> — check every link automatically before it opens</span>
        </label>
        <label class="mode-opt">
          <input type="radio" name="mode" value="both" />
          <span><b>Both</b> — auto-check on click <i>and</i> the right-click option</span>
        </label>
      </div>

      <div class="actions">
        <button id="save" class="btn btn-primary">Save</button>
        <span id="saved" class="opt-saved" hidden>Saved</span>
      </div>
    </div>
    <script src="core.js"></script>
    <script src="options.js"></script>
  </body>
</html>
